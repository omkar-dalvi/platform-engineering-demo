apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.app.name }}-postgres-secret
  namespace: {{ .Values.namespace.name }}
type: Opaque
data:
  # Base64 encoded password: mysecretpassword
  # To generate: echo -n "mysecretpassword" | base64
  POSTGRES_PASSWORD: bXlzZWNyZXRwYXNzd29yZA==
  DB_PASSWORD: bXlzZWNyZXRwYXNzd29yZA==
