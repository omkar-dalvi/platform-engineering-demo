apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.app.name }}-backend
  namespace: {{ .Values.namespace.name }}
spec:
  type: {{ .Values.backend.service.type }}
  selector:
    app: backend
  ports:
  - port: {{ .Values.backend.service.port }}
    targetPort: {{ .Values.backend.port }}
    protocol: TCP
    name: http
