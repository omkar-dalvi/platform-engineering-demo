{{- if .Values.postgresql.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.app.name }}-postgres
  namespace: {{ .Values.namespace.name }}
spec:
  type: {{ .Values.postgresql.service.type }}
  selector:
    app: postgres
  ports:
  - port: {{ .Values.postgresql.service.port }}
    targetPort: {{ .Values.postgresql.port }}
    protocol: TCP
    name: postgres
{{- end }}
